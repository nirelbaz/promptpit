name: AI Code Review

on:
  pull_request:
    branches: [main]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            Review this PR for the PromptPit CLI (npm: promptpit).
            Focus on:
            - Security issues (shell injection via execFileSync, unsafe YAML parsing, path traversal)
            - Correctness bugs in adapter logic
            - Breaking changes to the PlatformAdapter interface or stack schema
            Be concise. Skip style nits.
